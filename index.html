<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParseIt - Examen Interactivo</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="vendor/choices.min.css">
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                
                <div class="header-selector">
                    <select id="examen-select" class="form-select">
                        <option value="" disabled selected>Cargando exámenes...</option>
                    </select>
                </div>

                <div class="percentage-selector">
                    <select id="percent-select" class="form-select">
                        <option value="1">100%</option>
                        <option value="0.75">75%</option>
                        <option value="0.5">50%</option>
                        <option value="0.25">25%</option>
                        <option value="0.05">5%</option>
                    </select>
                </div>

                <button id="theme-toggle" class="btn-icon" aria-label="Cambiar tema">
                    <svg id="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
            <div class="header-info-row">
                <div class="header-controls-left">
                    <label class="switch-study" title="Corrección inmediata">
                        <input type="checkbox" id="check-estudio">
                        <span class="slider-study"></span>
                    </label>
                </div>
                
                <div class="header-status-group">
                    <div id="timer-container" class="timer-container hidden">
                        <span id="timer-display" class="timer-display">00:00</span>
                        <button id="btn-reiniciar" class="btn-reset" title="Reiniciar examen">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                <path d="M3 3v5h5"></path>
                            </svg>
                        </button>
                    </div>
                    <button id="btn-finalizar" class="progress-bubble" title="Finalizar Examen">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <span id="progress-display">0 / 0</span>
                    </button>
                    <div id="examen-status" class="status-bubble hidden"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="status-message" class="status-message hidden"></div>
        
        <form id="examen-form" class="exam-form">
            <div id="preguntas-container">
                <!-- Se llenará dinámicamente -->
            </div>
        </form>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div id="examen-metadatos" class="meta-container-footer">
                <!-- Se llenará dinámicamente -->
            </div>
            <p>&copy; 2026 ParseIt - Sistema de Evaluación (v9)</p>
        </div>
    </footer>

    <script src="vendor/choices.min.js"></script>
    <script src="vendor/confetti.browser.min.js"></script>
    <script src="src/app.js" type="module"></script>
</body>
</html>
